<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuesta UADE</title>
    <meta
      name="description"
      content="Encuesta de investigación sobre apuestas online, videojuegos y escuela."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="backdrop"></div>
      <main class="layout">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Encuesta pública</p>
            <h1>Apuestas online, videojuegos y escuela</h1>
          </div>
        </section>

        <section class="form-card">
          <form id="research-form" novalidate>
            <p class="form-intro">
              Indicá tu grado de acuerdo con cada afirmación y completá las preguntas finales.
            </p>

            <div class="questions" id="questions"></div>

            <div class="actions">
              <button type="submit" class="primary-button">Enviar respuestas</button>
              <button type="button" class="ghost-button" id="clear-demo-data">
                Limpiar demo local
              </button>
            </div>

            <p class="helper">
              
            </p>

            <div class="feedback" id="feedback" aria-live="polite"></div>
          </form>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
